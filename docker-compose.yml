services:
  # ─── MinIO (S3-compatible store for Apache Iceberg / PGAA) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - converged-analytics-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5


  # ─── MinIO bucket initialisation (one-shot) ───────────────────────────────────
  createbuckets:
    image: minio/mc:latest
    container_name: minio-createbuckets
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - converged-analytics-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 minioadmin minioadmin
        echo "MinIO is ready, creating bucket..."
        mc mb local/whpg-lakehouse --ignore-existing
        echo "Bucket created successfully"
        exit 0

# ─── WHPG Cluster: 1 Coordinator + 2 Segments ───────────────────────────────────
  whpg_cdw:
    build:
      context: .
      secrets:
        - repo_token
    image: whpg_cdw
    platform: linux/amd64
    container_name: cdw
    hostname: cdw
    tty: true
    privileged: true
    tmpfs:
      - /run
      - /run/lock
    networks:
      - converged-analytics-network
    ports:
      - "5432:5432"
      - "8081:8081"    # gpfdist (CSV bulk load)
      - "5000:5000"    # Lab 2 — PGAA Benchmark dashboard
      - "5001:5001"    # Lab 1 — Network Analytics dashboard
      - "5002:5002"    # Lab 3 — AI Analytics dashboard
    volumes:
      - master:/data/master
      - ./scripts:/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/master/gpinitsystem_complete &&  su - gpadmin -c \"psql -d template1 -c 'SELECT 1'\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  whpg_seg1:
    image: whpg_cdw
    depends_on:
      whpg_cdw:
        condition: service_started
    container_name: sdw1
    hostname: sdw1
    tty: true
    privileged: true
    tmpfs:
      - /run
      - /run/lock
    platform: linux/amd64
    networks:
      - converged-analytics-network
    volumes:
      - sdw1_primary1:/data1/primary
      - sdw1_primary2:/data2/primary
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x postgres > /dev/null || pgrep -x sshd > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  whpg_seg2:
    image: whpg_cdw
    depends_on:
      whpg_cdw:
        condition: service_started
    container_name: sdw2
    hostname: sdw2
    tty: true
    privileged: true
    tmpfs:
      - /run
      - /run/lock
    platform: linux/amd64
    networks:
      - converged-analytics-network
    volumes:
      - sdw2_primary1:/data1/primary
      - sdw2_primary2:/data2/primary
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x postgres > /dev/null || pgrep -x sshd > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  master:
  sdw1_primary1:
  sdw1_primary2:
  sdw2_primary1:
  sdw2_primary2:
  minio-data:   # /data   — MinIO object storage

networks:
  converged-analytics-network:
    name: converged-analytics-network

secrets:
  repo_token:
    environment: EDB_SUBSCRIPTION_TOKEN
